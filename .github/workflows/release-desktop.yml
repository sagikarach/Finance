name: Release Desktop Apps

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (e.g. v1.2.3)"
        required: true
      target_os:
        description: "Which OS to build"
        required: true
        type: choice
        default: all
        options:
          - all
          - macos
          - windows
          - linux
      prerelease:
        description: "Mark release as prerelease"
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-macos:
    if: ${{ github.event.inputs.target_os == 'all' || github.event.inputs.target_os == 'macos' }}
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python3 -m pip install -r requirements.txt

      - name: Write public key for updater
        env:
          SPARKLE_EDDSA_KEY: ${{ secrets.SPARKLE_EDDSA_KEY }}
        run: |
          python3 scripts/appcast_tools.py write-pubkey --out finance/appcast_key.py

      - name: Build macOS app
        run: |
          chmod +x scripts/build_macos_app.sh
          ./scripts/build_macos_app.sh

      - name: Generate macOS appcast (signed)
        env:
          SPARKLE_EDDSA_KEY: ${{ secrets.SPARKLE_EDDSA_KEY }}
        run: |
          tag="${GITHUB_REF_NAME:-${GITHUB_SHA::7}}"
          python3 scripts/appcast_tools.py generate \
            --zip dist/Finance-mac.zip \
            --tag "$tag" \
            --repo "${GITHUB_REPOSITORY}" \
            --out dist/appcast.json

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Finance-mac
          path: |
            dist/Finance-mac.zip
            dist/appcast.json
          if-no-files-found: error

  build-linux:
    if: ${{ github.event.inputs.target_os == 'all' || github.event.inputs.target_os == 'linux' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Linux app
        run: |
          chmod +x scripts/build_linux_app.sh
          ./scripts/build_linux_app.sh

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: Finance-linux
          path: dist/Finance-linux.zip
          if-no-files-found: error

  build-windows:
    if: ${{ github.event.inputs.target_os == 'all' || github.event.inputs.target_os == 'windows' }}
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Windows app
        shell: bash
        run: |
          chmod +x scripts/build_windows_app.sh
          ./scripts/build_windows_app.sh

      - name: Ensure Windows zip artifact
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/Finance-win.zip")) {
            if (-not (Test-Path "dist/Finance")) { throw "dist/Finance missing after build" }
            Compress-Archive -Path "dist/Finance/*" -DestinationPath "dist/Finance-win.zip"
          }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Finance-windows
          path: dist/Finance-win.zip
          if-no-files-found: error

  release:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -R artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          prerelease: ${{ github.event.inputs.prerelease }}
          files: |
            artifacts/**/*.zip
            artifacts/**/*.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


